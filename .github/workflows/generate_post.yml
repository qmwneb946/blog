# .github/workflows/generate_post.yml

name: Hourly AI Blog Post Generator

on:
  # 每小时的 0 分触发 (e.g., 1:00, 2:00, 3:00)
  schedule:
    - cron: '0 * * * *'
  # 允许你从 GitHub Actions 页面手动触发此工作流
  workflow_dispatch:

jobs:
  generate-post:
    # 需要有写入内容的权限才能将新文章推送到仓库
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # 检出你的仓库代码
        uses: actions/checkout@v4

      - name: Set up Python
        # 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        # 安装调用 AI API 所需的 Python 库
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Python script for post generation
        # 运行根目录下的 Python 脚本来生成文章
        # 脚本会使用你在 GitHub Secrets 中设置的 GEMINI_API_KEY
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_article.py

      - name: Commit and push if changes
        # 提交并推送新生成的文章
        id: commit_push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull
          git add -A
          # 检查是否有文件变动，只有在生成了新文章时才提交
          if ! git diff-index --quiet HEAD; then
            # 从上一步获取文章标题用于 commit message
            title_from_output=$(grep '^title=' "$GITHUB_OUTPUT" | cut -d= -f2-)
            git commit -m "feat: AI 自动生成文章 - ${title_from_output}"
            git push
          else
            echo "没有文件变动，无需提交。"
          fi